# fly.toml app configuration file generated for elp-szsvww on 2026-07-15T19:37:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elp-szsvww'
primary_region = 'iad'

[build]

[env]
  MUSKMETER_CONFIG_PATH = '/data/config.json'
  MUSKMETER_DATA_DIR = '/data'
  PORT = '8080'

[[mounts]]
  source = 'muskmeter_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/status'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
