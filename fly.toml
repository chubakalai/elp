app = "muskmeter"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  MUSKMETER_DATA_DIR = "/data"
  MUSKMETER_CONFIG_PATH = "/data/config.json"

[[mounts]]
  source = "muskmeter_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/status"
    timeout = "5s"
